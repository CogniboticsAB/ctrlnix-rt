name: Build RT Kernel and EtherCAT (aarch64 + x86_64)

on:
  push:
    branches: [ master ]
  schedule:
    # Rebuild weekly to pick up nixpkgs security updates
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  build-aarch64:
    name: Build on native ARM64
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: cognibotics
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build RT kernel
        run: |
          nix build .#packages.aarch64-linux.kernel \
            --no-link --print-out-paths \
            | cachix push cognibotics

      - name: Build EtherCAT kernel module
        run: |
          nix build .#packages.aarch64-linux.ethercat-kmod \
            --no-link --print-out-paths \
            | cachix push cognibotics

      - name: Build EtherCAT userspace tools
        run: |
          nix build .#packages.aarch64-linux.ethercat-userspace \
            --no-link --print-out-paths \
            | cachix push cognibotics

  build-x86_64:
    name: Build on native x86_64
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: cognibotics
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build RT kernel
        run: |
          nix build .#packages.x86_64-linux.kernel \
            --no-link --print-out-paths \
            | cachix push cognibotics

      - name: Build EtherCAT kernel module
        run: |
          nix build .#packages.x86_64-linux.ethercat-kmod \
            --no-link --print-out-paths \
            | cachix push cognibotics

      - name: Build EtherCAT userspace tools
        run: |
          nix build .#packages.x86_64-linux.ethercat-userspace \
            --no-link --print-out-paths \
            | cachix push cognibotics
